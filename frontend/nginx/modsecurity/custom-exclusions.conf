# Allow raw JPEG/PNG avatar uploads without disabling ModSecurity.
#
# Context:
# The avatar endpoint intentionally receives the image as a raw request body:
#   POST /api/v1/user/avatar/<id>
#   Content-Type: image/jpeg or image/png
#
# OWASP CRS rule 920420 rejects these content types by default because they are
# not part of the standard allowed application request content types.
#
# We remove only rule 920420, only for this endpoint, only for POST requests,
# and only for JPEG/PNG raw uploads. Other CRS rules remain active.

SecRule REQUEST_METHOD "@streq POST" \
    "id:1001001,phase:1,pass,nolog,chain,ctl:ruleRemoveById=920420"
    SecRule REQUEST_URI "@rx ^/api/v1/user/avatar/[0-9]+$" \
        "chain"
        SecRule REQUEST_HEADERS:Content-Type "@rx ^image/(jpeg|png)$"