services:
    api-gateway:
        profiles: ["app"]
        container_name: api-gateway
        build: services/api-gateway
        ports:
            - "3000:3000"
        networks:
            - frontend-network
            - backend-network
        restart: unless-stopped
        # depends_on:
        #   minio:
        #     condition: service_healthy

    svc-auth:
        profiles: ["app"]
        container_name: svc-auth
        build: services/svc-auth
        networks:
            - backend-network
        volumes:
            - svc_auth_secrets:/secrets:ro
        depends_on:
            auth-db:
                condition: service_healthy
            vault-agent-auth:
                condition: service_completed_successfully
        restart: unless-stopped

    svc-user:
        profiles: ["app"]
        container_name: svc-user
        build: services/svc-user
        networks:
            - backend-network
        volumes:
            - svc_user_secrets:/secrets:ro
            - profile_pictures:/var/www/avatars
        depends_on:
            user-db:
                condition: service_healthy
            vault-agent-user:
                condition: service_completed_successfully
        restart: unless-stopped

    svc-interview-store:
        profiles: ["app"]
        container_name: svc-interview-store
        build: services/svc-interview-store
        networks:
            - backend-network
        volumes:
            - svc_interview_store_secrets:/secrets:ro
        depends_on:
            interview-store-db:
                condition: service_healthy
            vault-agent-interview-store:
                condition: service_completed_successfully
        restart: unless-stopped

    svc-grading:
        profiles: ["app"]
        container_name: svc-grading
        build: services/svc-grading
        networks:
            - backend-network
        volumes:
            - svc_grading_secrets:/secrets:ro
        depends_on:
            grading-db:
                condition: service_healthy
            vault-agent-grading:
                condition: service_completed_successfully
        restart: unless-stopped

