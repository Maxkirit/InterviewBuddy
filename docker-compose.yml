secrets:
    auth_db_superuser_password:
        file: ./infrastructure/secrets/auth_db_superuser_password.txt
    auth_db_admin_password:
        file: ./infrastructure/secrets/auth_db_admin_password.txt
    auth_db_app_password:
        file: ./infrastructure/secrets/auth_db_app_password.txt
    user_db_superuser_password:
        file: ./infrastructure/secrets/user_db_superuser_password.txt
    user_db_admin_password:
        file: ./infrastructure/secrets/user_db_admin_password.txt
    user_db_app_password:
        file: ./infrastructure/secrets/user_db_app_password.txt
    interview_store_db_superuser_password:
        file: ./infrastructure/secrets/interview_store_db_superuser_password.txt
    interview_store_db_admin_password:
        file: ./infrastructure/secrets/interview_store_db_admin_password.txt
    interview_store_db_app_password:
        file: ./infrastructure/secrets/interview_store_db_app_password.txt
    serialization_db_password:
        file: ./infrastructure/secrets/serializationdb_superuser_password.txt
    grading_db_password:
        file: ./infrastructure/secrets/gradingdb_superuser_password.txt
    svc_auth_role_id:
        file: ./infrastructure/secrets/vault/svc-auth.role_id
    svc_auth_secret_id:
        file: ./infrastructure/secrets/vault/svc-auth.secret_id

networks:
    frontend-network:
        driver: bridge
    backend-network:
        driver: bridge

volumes:
    auth_db:
        name: auth_db_volume
    user_db:
        name: user_db_volume
    interview_store_db:
        name: interview_store_db_volume
    grading_db:
        name: grading_db_volume
    serialization_db:
        name: serialization_db_volume
    monitoring:
        name: monitoring_volume
    ingress:
        name: ingress_volume
    vault_data:
        name: vault_data_volume
    vault_tls:
        name: vault_tls_volume
    vault_bootstrap_secrets:
        name: vault_bootstrap_secrets_volume
