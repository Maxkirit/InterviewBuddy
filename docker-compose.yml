services:
    api-gateway:
        profiles: ["app"]
        container_name: api-gateway
        build: services/api-gateway
        ports:
            - "3000:3000"
        networks:
            - frontend-network
            - backend-network
        restart: unless-stopped
        # depends_on:
        #   minio:
        #     condition: service_healthy

    svc-auth:
        profiles: ["app"]
        container_name: svc-auth
        build: services/svc-auth
        networks:
            - backend-network
        volumes:
            - svc_auth_secrets:/secrets:ro
        depends_on:
          auth-db:
            condition: service_healthy
          vault-agent-auth:
            condition: service_started
        restart: unless-stopped

    vault-agent-auth:
        profiles: ["app"]
        container_name: vault-agent-auth
        image: hashicorp/vault:2.0.0
        user: "0:0"
        entrypoint: ["/bin/vault"]
        command: ["agent", "-config=/vault/agent/agent.hcl"]
        environment:
            VAULT_ADDR: "https://vault:8200"
            VAULT_CACERT: "/vault/tls/ca.crt"
        volumes:
            - vault_tls:/vault/tls:ro
            - svc_auth_vault_creds:/vault/creds:ro
            - svc_auth_secrets:/secrets
            - ./infrastructure/vault/agents/auth:/vault/agent:ro
        networks:
            - backend-network
        restart: unless-stopped

    svc-user:
        profiles: ["app"]
        container_name: svc-user
        build: services/svc-user
        networks:
            - backend-network
        volumes:
            - svc_user_secrets:/secrets:ro
        depends_on:
            user-db:
                condition: service_healthy
            vault-agent-user:
                condition: service_started
        restart: unless-stopped

    vault-agent-user:
        profiles: ["app"]
        container_name: vault-agent-user
        image: hashicorp/vault:2.0.0
        user: "0:0"
        entrypoint: ["/bin/vault"]
        command: ["agent", "-config=/vault/agent/agent.hcl"]
        environment:
            VAULT_ADDR: "https://vault:8200"
            VAULT_CACERT: "/vault/tls/ca.crt"
        volumes:
            - vault_tls:/vault/tls:ro
            - svc_user_vault_creds:/vault/creds:ro
            - svc_user_secrets:/secrets
            - ./infrastructure/vault/agents/user:/vault/agent:ro
        networks:
            - backend-network
        restart: unless-stopped

    svc-interview-store:
        profiles: ["app"]
        container_name: svc-interview-store
        build: services/svc-interview-store
        networks:
            - backend-network
        volumes:
            - svc_interview_store_secrets:/secrets:ro        
        depends_on:
          interview-store-db:
            condition: service_healthy
          vault-agent-interview-store:
            condition: service_started
        # restart: unless-stopped

    vault-agent-interview-store:
        profiles: ["app"]
        container_name: vault-agent-interview-store
        image: hashicorp/vault:2.0.0
        user: "0:0"
        entrypoint: ["/bin/vault"]
        command: ["agent", "-config=/vault/agent/agent.hcl"]
        environment:
            VAULT_ADDR: "https://vault:8200"
            VAULT_CACERT: "/vault/tls/ca.crt"
        volumes:
            - vault_tls:/vault/tls:ro
            - svc_interview_store_vault_creds:/vault/creds:ro
            - svc_interview_store_secrets:/secrets
            - ./infrastructure/vault/agents/interview-store:/vault/agent:ro
        networks:
            - backend-network
        restart: unless-stopped

    # svc-serialization:
    #     container_name: svc-serialization
