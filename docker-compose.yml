            - auth_db_secrets:/secrets
            - ./infrastructure/vault/agents/auth-db/agent.hcl:/vault/agent/agent.hcl:ro
            - ./infrastructure/vault/agents/auth-db/templates:/vault/templates:ro
        networks:
