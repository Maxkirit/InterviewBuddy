    auth-db:
        container_name: auth-db
        build: infrastructure/databases/auth-db
        networks:
            - backend-network
        env_file:
            - infrastructure/databases/auth-db/.env_auth_db
        environment:
            POSTGRES_PASSWORD_FILE: /run/secrets/auth_db_superuser_password
        secrets:
            - auth_db_superuser_password
            - auth_db_admin_password
            - auth_db_app_password
        volumes:
            - auth_db:/var/lib/postgresql
        restart: unless-stopped

    user-db:
        container_name: user-db
        build: infrastructure/databases/user-db
        networks:
            - backend-network
        env_file:
          - infrastructure/databases/user-db/.env_user_db
        environment:
          POSTGRES_PASSWORD_FILE: /run/secrets/user_db_superuser_password
        secrets:
          - user_db_superuser_password
          - user_db_admin_password
          - user_db_app_password
        volumes:
          - user_db:/var/lib/postgresql
        restart: unless-stopped

    interview-store-db:
        profiles: ["app"]
        container_name: interview-store-db
        build: infrastructure/databases/interview-store-db
        networks:
            - backend-network
        env_file:
          - infrastructure/databases/interview-store-db/.env_interview_store_db
        environment:
          POSTGRES_PASSWORD_FILE: /run/secrets/interview_store_db_superuser_password
        secrets:
          - interview_store_db_superuser_password
          - interview_store_db_admin_password
          - interview_store_db_app_password
        volumes:
          - interview_store_db:/var/lib/postgresql
        restart: unless-stopped

    # grading-db:
