    interview_store_db_secrets:
        name: interview_store_db_secrets_volume
    grading_db_secrets:
        name: grading_db_secrets_volume

    # VAULT CREDS VOLUMES
    svc_auth_vault_creds:
        name: svc_auth_vault_creds_volume
    svc_user_vault_creds:
        name: svc_user_vault_creds_volume
    svc_interview_store_vault_creds:
        name: svc_interview_store_vault_creds_volume
    svc_grading_vault_creds:
        name: svc_grading_vault_creds_volume
    auth_db_vault_creds:
        name: auth_db_creds_volume
    user_db_vault_creds:
        name: user_db_creds_volume
    interview_store_db_vault_creds:
        name: svc_interview_store_db_creds_volume
    grading_db_vault_creds:
        name: grading_db_vault_creds_volume

    # VAULT VOLUMES
    vault_data:
        name: vault_data_volume
    vault_tls:
        name: vault_tls_volume
    vault_logs:
        name: vault_logs_volume
    vault_init:
        name: vault_init_volume
    frontend_tls:
        name: frontend_tls_volume
