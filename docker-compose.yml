    profile_pictures:
        name: profile_pictures_shared_volume
    prometheus_data:
        name: prometheus_data_volume
    grafana_data:
        name: grafana_data_volume
    
    # SECRETS VOLUMES FOR VAULT AGENTS AND SERVICES/DB
    svc_auth_secrets:
        name: svc_auth_secrets_volume
