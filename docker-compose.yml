        volumes:
            - vault_tls:/vault/tls:ro
            - svc_user_vault_creds:/vault/creds:ro
            - svc_user_secrets:/secrets
            - ./infrastructure/vault/agents/user:/vault/agent:ro
        networks:
            - backend-network
        restart: no

    vault-agent-interview-store:
        profiles: ["app"]
        container_name: vault-agent-interview-store
        image: hashicorp/vault:2.0.0
        user: "0:0"
        entrypoint: ["/bin/vault"]
