networks:
    frontend-network:
        driver: bridge
    backend-network:
        driver: bridge
volumes:
    auth_db:
        name: auth_db_volume
    user_db:
        name: user_db_volume
    interview_store_db:
        name: interview_store_db_volume
    grading_db:
        name: grading_db_volume
    serialization_db:
        name: serialization_db_volume
    monitoring:
        name: monitoring_volume
    ingress:
        name: ingress_volume
    profile_pictures:
        name: profile_pictures_shared_volume
    
    # SECRETS VOLUMES FOR VAULT AGENTS AND SERVICES/DB
    svc_auth_secrets:
        name: svc_auth_secrets_volume
    svc_user_secrets:
        name: svc_user_secrets_volume
    svc_interview_store_secrets:
        name: svc_interview_store_secrets_volume
    svc_grading_secrets:
        name: svc_grading_secrets_volume
    auth_db_secrets:
