<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>InterviewBuddy – Profile</title>
        <link rel="stylesheet" href="../css/styles.css" />
    </head>
    <body>
        <!-- Nav (candidate example) -->
        <nav>
            <div class="nav-logo">
                Interview<span>Buddy</span
                ><span class="nav-view-label">Candidate</span>
            </div>
            <ul class="nav-links">
                <li><a href="candidate-recruiters.html">Recruiters</a></li>
                <li><a href="candidate-interviews.html">Interviews</a></li>
                <li><a href="candidate-mocks.html">Mock</a></li>
            </ul>
            <div class="nav-right">
                <div class="avatar" title="Tom Nguyen">TN</div>
            </div>
        </nav>

        <!-- Page -->
        <div class="page">
            <div class="profile-layout">
                <!-- Left column -->
                <div class="profile-left">
                    <div class="profile-avatar-wrap">
                        <div class="profile-avatar">TN</div>
                        <button
                            class="profile-avatar-edit"
                            title="Change photo"
                        >
                            &#9998;
                        </button>
                    </div>
                    <div class="profile-identity">
                        <div class="name">Tom Nguyen</div>
                        <div class="meta">Site Reliability Engineer</div>
                        <div class="meta">Netherlands</div>
                    </div>
                </div>

                <!-- Right column -->
                <div class="profile-right">
                    <h1 class="profile-page-title">Profile</h1>
                    <div class="profile-row">
                        <div class="form-group">
                            <label for="firstname">First name</label>
                            <input type="text" id="firstname" value="Tom" />
                        </div>
                        <div class="form-group">
                            <label for="lastname">Last name</label>
                            <input type="text" id="lastname" value="Nguyen" />
                        </div>
                    </div>

                    <div class="profile-row">
                        <div class="form-group">
                            <label for="country">Country</label>
                            <input
                                type="text"
                                id="country"
                                value="Netherlands"
                            />
                        </div>
                        <div class="form-group">
                            <label for="org">Current organisation</label>
                            <input
                                type="text"
                                id="org"
                                placeholder="e.g. Acme Corp"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="bio">Bio</label>
                        <textarea
                            id="bio"
                            placeholder="Tell recruiters a bit about yourself…"
                        >
SRE with 4 years of experience in cloud infrastructure, Kubernetes, and observability. Passionate about building reliable systems at scale.</textarea
                        >
                    </div>

                    <div class="form-group">
                        <label for="socials">Social links</label>
                        <input
                            type="url"
                            id="socials"
                            placeholder="https://linkedin.com/in/yourname"
                        />
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone number</label>
                        <input
                            type="tel"
                            id="phone"
                            placeholder="+1 555 000 0000"
                        />
                    </div>

                    <div class="profile-save">
                        <button class="btn-primary">Save</button>
                    </div>
                </div>
            </div>
        </div>
        <footer class="page-footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </footer>
    </body>
</html>
